        const getCountryInitial = (coo) => {
            if (!coo) return "";
            const cleanInput = coo.trim().toUpperCase();
            if (COUNTRY_MAP[cleanInput]) return cleanInput;
            const entry = Object.entries(COUNTRY_MAP).find(([key, val]) => val.toUpperCase() === cleanInput);
            return entry ? entry[0] : (cleanInput === "USA" ? "US" : (cleanInput === "ESPANA" || cleanInput === "SPAIN" ? "ES" : coo));
        };

        const BarcodeItem = ({ label, value, color = "slate" }) => {
            const svgRef = useRef(null);
            useEffect(() => {
                if (value && svgRef.current) {
                    try {
                        window.JsBarcode(svgRef.current, String(value), {
                            format: "CODE128",
                            lineColor: "#000",
                            width: 1.3,
                            height: 35,
                            displayValue: true,
                            fontSize: 10,
                            font: "monospace",
                            margin: 4,
                            background: "#ffffff"
                        });
                    } catch (e) { console.error(e); }
                }
            }, [value]);
            const colorClass = color === "blue" ? "text-blue-700 border-blue-100" : "text-slate-600 border-slate-100";
            return (
                <div className={`flex flex-col items-center border rounded-lg bg-white p-1.5 shadow-sm ${colorClass}`}>

                    <svg ref={svgRef} className="max-w-full h-auto"></svg>

            );
        };

        const EditableField = ({ label, value, onChange, type = "text" }) => (
            <div className="flex flex-col gap-1 w-full text-left">
                <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{label}</label>
                <input type={type} value={value || ""} onChange={(e) => onChange(e.target.value)} className="border border-slate-200 rounded px-3 py-1.5 text-sm font-bold text-slate-800 focus:ring-2 focus:ring-blue-500 outline-none w-full" />
            </div>
        );

        function App() {
            const [view, setView] = useState('scan');
            const [isScanning, setIsScanning] = useState(false);
            const [isAppMode, setIsAppMode] = useState(false);
            const [rawText, setRawText] = useState("");
            const [fileBase64, setFileBase64] = useState(null);
            const [fileMimeType, setFileMimeType] = useState("");
            const [data, setData] = useState({ invoice: "", order: "", internalRef: "", date: new Date().toISOString().split('T')[0], items: [] });
            const [errorMsg, setErrorMsg] = useState(null);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        setFileBase64(reader.result.split(',')[1]);
                        setFileMimeType(file.type);
                        setRawText(`Archivo: ${file.name}`);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const processDocument = async () => {
                if (!apiKey || apiKey.trim() === "") {
                    setErrorMsg("FALTA LA API KEY. Pon tu clave de Google en la línea 24 del archivo HTML.");
                    return;
                }
                setIsScanning(true); setErrorMsg(null);
                const systemPrompt = "Eres un experto logístico. Extrae: Factura, PO, Mouser PN, Customer PN, Cantidad, Date Code, Lote y COO. Devuelve ÚNICAMENTE un JSON válido: { \"invoice\": \"str\", \"order\": \"str\", \"internalRef\": \"str\", \"date\": \"YYYY-MM-DD\", \"items\": [{ \"mouserPn\": \"str\", \"custPn\": \"str\", \"desc\": \"str\", \"qty\": num, \"dateCode\": \"str\", \"lotCode\": \"str\", \"coo\": \"str\" }] }";
                
                try {
                    const payload = {
                        contents: [{ parts: [{ text: `Procesa este albarán: ${rawText}` }, ...(fileBase64 ? [{ inlineData: { mimeType: fileMimeType, data: fileBase64 } }] : [])] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json", temperature: 0.1 }
                    };
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload)
                    });
                    if (!response.ok) { const err = await response.json(); throw new Error(err.error?.message || "Error de conexión"); }
                    const res = await response.json();
                    let text = res.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                    const extracted = JSON.parse(text);
                    extracted.items = (extracted.items || []).map(i => ({ ...i, id: Math.random().toString(36), coo: getCountryInitial(i.coo) }));
                    setData(extracted); setView('print');
                } catch (e) { setErrorMsg(`Error: ${e.message}`); } finally { setIsScanning(false); }
            };

            return (
                <div className={`min-h-screen ${isAppMode ? 'bg-white' : 'bg-slate-50'}`}>
                    {view !== 'scan' && (
                        <nav className="bg-slate-900 text-white px-6 py-4 sticky top-0 z-50 shadow-xl print:hidden flex justify-between items-center">
                            <div className="flex items-center gap-4 cursor-pointer" onClick={() => setView('scan')}>
                                <div className="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center font-black">M</div>
                            </div>
                            <div className="flex gap-2 bg-slate-800 p-1 rounded-2xl">
                                <button onClick={() => setView('review')} className={`px-6 py-2 rounded-xl text-[10px] font-black ${view === 'review' ? 'bg-blue-600' : 'text-slate-400'}`}>EDITAR</button>
                                <button onClick={() => setView('print')} className={`px-6 py-2 rounded-xl text-[10px] font-black ${view === 'print' ? 'bg-blue-600' : 'text-slate-400'}`}>ETIQUETAS</button>
                            </div>
                            <div className="flex gap-3">
                                <button onClick={() => setIsAppMode(!isAppMode)} className="p-2.5 rounded-xl border border-slate-700 bg-slate-800 text-slate-300 text-[10px] font-black">MODO APP</button>
                                <button onClick={() => window.print()} className="bg-white text-slate-900 px-6 py-2 rounded-xl text-[10px] font-black shadow-xl">IMPRIMIR</button>
                            </div>
                        </nav>
                    )}
                    <main className="flex flex-col items-center justify-center min-h-screen">
                        {view === 'scan' && (
