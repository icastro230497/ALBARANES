<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouser Smart Scan Web</title>
    <!-- Librerías de React, Babel y Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        
        @media print {
            body { background: white !important; }
            nav, .no-print, button, .header-nav { display: none !important; }
            main { padding: 0 !important; width: 100% !important; margin: 0 !important; }
            @page { margin: 0.5cm; size: A4 portrait; }
            .label-card { 
                box-shadow: none !important; 
                border: 3px solid black !important;
                break-inside: avoid;
                page-break-inside: avoid;
                margin-bottom: 20px;
                padding: 1.5rem !important;
            }
        }

        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIGURACIÓN ---
        // Clave API proporcionada por el usuario
        const apiKey = "AIzaSyCWACbPgBeaMuPyrZS0llgjRegva0GbM6Q"; 
        // Usamos la versión estable v1 para evitar errores de campos desconocidos
        const MODEL_NAME = "gemini-1.5-flash";
        const API_URL = `https://generativelanguage.googleapis.com/v1/models/${MODEL_NAME}:generateContent?key=${apiKey}`;

        // --- TABLA DE PAÍSES ---
        const COUNTRY_MAP = {
            "AD": "Andorra", "AE": "Utd.Arab Emir.", "AF": "Afghanistan", "AG": "Antigua/Barbuda", "AI": "Anguilla",
            "AL": "Albania", "AM": "Armenia", "AN": "Dutch Antilles", "AO": "Angola", "AQ": "Antarctica",
            "AR": "Argentina", "AS": "Samoa, American", "AT": "Austria", "AU": "Australia", "AW": "Aruba",
            "AZ": "Azerbaijan", "BA": "Bosnia-Herz.", "BB": "Barbados", "BD": "Bangladesh", "BE": "Belgium",
            "BF": "Burkina-Faso", "BG": "Bulgaria", "BH": "Bahrain", "BI": "Burundi", "BJ": "Benin",
            "BM": "Bermuda", "BN": "Brunei Dar-es-S", "BO": "Bolivia", "BR": "Brazil", "BS": "Bahamas",
            "BT": "Bhutan", "BV": "Bouvet Island", "BW": "Botswana", "BY": "Belarus", "BZ": "Belize",
            "CA": "Canada", "CC": "Coconut Islands", "CD": "Congo", "CF": "Central Afr.Rep", "CG": "Congo",
            "CH": "Switzerland", "CI": "Ivory Coast", "CK": "Cook Islands", "CL": "Chile", "CM": "Cameroon",
            "CN": "China", "CO": "Colombia", "CR": "Costa Rica", "CU": "Cuba", "CV": "Cape Verde",
            "CX": "Christmas Islnd", "CY": "Cyprus", "CZ": "Czech Republic", "DE": "Germany", "DJ": "Djibouti",
            "DK": "Denmark", "DM": "Dominica", "DO": "Dominican Rep.", "DZ": "Algeria", "EC": "Ecuador",
            "EE": "Estonia", "EG": "Egypt", "EH": "West Sahara", "ER": "Eritrea", "ES": "Spain",
            "ET": "Ethiopia", "FI": "Finland", "FJ": "Fiji", "FK": "Falkland Islnds", "FM": "Micronesia",
            "FO": "Faroe Islands", "FR": "France", "GA": "Gabon", "GB": "United Kingdom", "GD": "Grenada",
            "GE": "Georgia", "GF": "French Guayana", "GH": "Ghana", "GI": "Gibraltar", "GL": "Greenland",
            "GM": "Gambia", "GN": "Guinea", "GP": "Guadeloupe", "GQ": "Equatorial Gui.", "GR": "Greece",
            "GS": "S. Sandwich Ins", "GT": "Guatemala", "GU": "Guam", "GW": "Guinea-Bissau", "GY": "Guyana",
            "HK": "Hong Kong", "HM": "Heard/Mcd.Isl", "HN": "Honduras", "HR": "Croatia", "HT": "Haiti",
            "HU": "Hungary", "ID": "Indonesia", "IE": "Ireland", "IL": "Israel", "IM": "Isle of Man",
            "IN": "India", "IO": "Brit.Ind.Oc.Ter", "IQ": "Iraq", "IR": "Iran", "IS": "Iceland",
            "IT": "Italy", "JM": "Jamaica", "JO": "Jordan", "JP": "Japan", "KE": "Kenya", "KG": "Kyrgyzstan",
            "KH": "Cambodia", "KI": "Kiribati", "KM": "Comoros", "KN": "St Kitts&Nevis", "KP": "North Korea",
            "KR": "South Korea", "KW": "Kuwait", "KY": "Cayman Islands", "KZ": "Kazakhstan", "LA": "LAOS",
            "LB": "Lebanon", "LC": "St. Lucia", "LI": "Liechtenstein", "LK": "Sri Lanka", "LR": "Liberia",
            "LS": "Lesotho", "LT": "Lithuania", "LU": "Luxembourg", "LV": "Latvia", "LY": "Libya",
            "MA": "Morocco", "MC": "Monaco", "MD": "Moldavia", "MG": "Madagascar", "MH": "Marshall Islnds",
            "MK": "Macedonia", "ML": "Mali", "MM": "Myanmar", "MN": "Mongolia", "MO": "Macau",
            "MP": "N.Mariana Islnd", "MQ": "Martinique", "MR": "Mauretania", "MS": "Montserrat", "MT": "Malta",
            "MU": "Mauritius", "MV": "Maldives", "MW": "Malawi", "MX": "Mexico", "MY": "Malaysia",
            "MZ": "Mozambique", "NA": "Namibia", "NC": "New Caledonia", "NE": "Niger", "NF": "Norfolk Island",
            "NG": "Nigeria", "NI": "Nicaragua", "NL": "Netherlands", "NO": "Norway", "NP": "Nepal",
            "NR": "Nauru", "NU": "Niue Islands", "NZ": "New Zealand", "OM": "Oman", "PA": "Panama",
            "PE": "Peru", "PF": "Frenc.Polynesia", "PG": "Papua Nw Guinea", "PH": "Philippines", "PK": "Pakistan",
            "PL": "Poland", "PM": "St.Pier.Miquel.", "PN": "Pitcairn Islnds", "PR": "Puerto Rico", "PT": "Portugal",
            "PW": "Palau", "PY": "Paraguay", "QA": "Qatar", "RE": "Reunion", "RO": "Romania", "RS": "Serbia",
            "RU": "Russian Fed.", "RW": "Ruanda", "SA": "Saudi Arabia", "SB": "Solomon Islands", "SC": "Seychelles",
            "SD": "Sudan", "SE": "Sweden", "SG": "Singapore", "SH": "St. Helena", "SI": "Slovenia",
            "SJ": "Svalbard", "SK": "Slovakia", "SL": "Sierra Leone", "SM": "San Marino", "SN": "Senegal",
            "SO": "Somalia", "SR": "Suriname", "ST": "S.Tome,Principe", "SV": "El Salvador", "SX": "Sint Maarten",
            "SY": "Syria", "SZ": "Swaziland", "TC": "Turksh Caicosin", "TD": "Chad", "TF": "French S.Territ",
            "TG": "Togo", "TH": "Thailand", "TJ": "Tajikistan", "TK": "Tokelau Islands", "TM": "Turkmenistan",
            "TN": "Tunisia", "TO": "Tonga", "TP": "East Timor", "TR": "Turkey", "TT": "Trinidad,Tobago",
            "TV": "Tuvalu", "TW": "Taiwan", "TZ": "Tanzania", "UA": "Ukraine", "UG": "Uganda", "UM": "Minor Outl.Ins.",
            "US": "USA", "UY": "Uruguay", "UZ": "Uzbekistan", "VA": "Vatican City", "VC": "St. Vincent",
            "VE": "Venezuela", "VG": "Brit.Virgin Is.", "VI": "Amer.Virgin Is.", "VN": "Vietnam", "VU": "Vanuatu",
            "WF": "Wallis,Futuna", "WS": "Western Samoa", "XX": "Multiple COO", "YE": "Yemen", "YT": "Mayotte",
            "YU": "Serbie", "YY": "Not available", "ZA": "South Africa", "ZM": "Zambia", "ZW": "Zimbabwe"
        };

        const getShortCoo = (val) => {
            if (!val) return "N/A";
            const clean = val.trim().toUpperCase();
            if (COUNTRY_MAP[clean]) return clean;
            const entry = Object.entries(COUNTRY_MAP).find(([k, v]) => v.toUpperCase() === clean);
            if (entry) return entry[0];
            if (clean === "USA") return "US";
            if (clean === "SPAIN" || clean === "ESPANA") return "ES";
            return val;
        };

        // --- COMPONENTES ---

        const Barcode = ({ label, value, blue = false }) => {
            const svgRef = useRef(null);
            useEffect(() => {
                if (value && svgRef.current) {
                    try {
                        window.JsBarcode(svgRef.current, String(value), {
                            format: "CODE128",
                            lineColor: "#000",
                            width: 1.2,
                            height: 32,
                            displayValue: true,
                            fontSize: 10,
                            font: "monospace",
                            margin: 2
                        });
                    } catch (e) { console.error("Error Barcode:", e); }
                }
            }, [value]);

            const theme = blue ? "text-blue-700 border-blue-100" : "text-slate-600 border-slate-100";
            return (
                <div className={`flex flex-col items-center border rounded bg-white p-1 shadow-sm ${theme}`}>
                    <span className="text-[7px] font-black uppercase w-full px-1">{label}</span>
                    <svg ref={svgRef} className="max-w-full"></svg>
                </div>
            );
        };

        const EditField = ({ label, value, onChange, type = "text" }) => (
            <div className="flex flex-col gap-1 w-full text-left">
                <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{label}</label>
                <input 
                    type={type} 
                    value={value || ""} 
                    onChange={(e) => onChange(e.target.value)} 
                    className="border border-slate-200 rounded px-3 py-2 text-sm font-semibold text-slate-800 focus:ring-2 focus:ring-blue-500 outline-none w-full bg-white shadow-inner" 
                />
            </div>
        );

        // --- APP ---

        function App() {
            const [view, setView] = useState('scan');
            const [isScanning, setIsScanning] = useState(false);
            const [isAppMode, setIsAppMode] = useState(false);
            const [rawText, setRawText] = useState("");
            const [fileData, setFileData] = useState({ base64: null, mime: "" });
            const [data, setData] = useState({ invoice: "", order: "", internalRef: "", date: new Date().toISOString().split('T')[0], items: [] });
            const [errorMsg, setErrorMsg] = useState(null);

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        setFileData({ base64: reader.result.split(',')[1], mime: file.type });
                        setRawText(`Archivo: ${file.name}`);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const processAI = async () => {
                setIsScanning(true); setErrorMsg(null);
                
                // Instrucciones integradas en el prompt para evitar errores de campos desconocidos
                const systemPrompt = `Eres un experto logístico. Tu tarea es extraer datos de un albarán de Mouser.
                Extrae: Invoice, PO (Pedido), Mouser PN, Customer PN, Cantidad, Date Code, Lote y COO.
                RESPONDE EXCLUSIVAMENTE CON UN JSON VÁLIDO siguiendo este formato:
                {
                  "invoice": "string",
                  "order": "string",
                  "internalRef": "string",
                  "date": "YYYY-MM-DD",
                  "items": [
                    { "mouserPn": "string", "custPn": "string", "desc": "string", "qty": number, "dateCode": "string", "lotCode": "string", "coo": "string" }
                  ]
                }
                
                Analiza este contenido: ${rawText}`;
                
                try {
                    // Payload simplificado al máximo para compatibilidad v1
                    const payload = {
                        contents: [{ 
                            parts: [
                                { text: systemPrompt },
                                ...(fileData.base64 ? [{ inlineData: { mimeType: fileData.mime, data: fileData.base64 } }] : [])
                            ] 
                        }]
                    };
                    
                    const response = await fetch(API_URL, {
                        method: "POST", 
                        headers: { "Content-Type": "application/json" }, 
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error?.message || "Error de red");
                    }

                    const res = await response.json();
                    let text = res.candidates[0].content.parts[0].text;
                    
                    // Limpieza robusta del JSON
                    text = text.replace(/```json|```/g, "").trim();
                    const extracted = JSON.parse(text);
                    
                    extracted.items = (extracted.items || []).map(i => ({ 
                        ...i, 
                        id: Math.random().toString(36).substr(2, 9), 
                        coo: getShortCoo(i.coo) 
                    }));
                    
                    setData(extracted); 
                    setView('print');
                } catch (e) { 
                    console.error("Error completo:", e);
                    setErrorMsg(`Error: ${e.message}. Intenta copiar el texto manualmente.`); 
                } finally { setIsScanning(false); }
            };

            return (
                <div className={`min-h-screen transition-all ${isAppMode ? 'bg-white' : 'bg-slate-100'}`}>
                    {view !== 'scan' && (
                        <nav className="header-nav bg-slate-900 text-white px-6 py-4 flex justify-between items-center shadow-xl sticky top-0 z-50 print:hidden">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('scan')}>
                                <div className="bg-blue-600 text-white w-8 h-8 rounded flex items-center justify-center font-black text-xs">M</div>
                                <span className="text-xs font-black uppercase tracking-widest hidden md:inline">Logistics Terminal</span>
                            </div>
                            <div className="flex gap-2 bg-slate-800 p-1 rounded-xl">
                                <button onClick={() => setView('edit')} className={`px-4 py-1.5 rounded-lg text-[10px] font-bold ${view === 'edit' ? 'bg-blue-600' : 'text-slate-400'}`}>EDITAR</button>
                                <button onClick={() => setView('print')} className={`px-4 py-1.5 rounded-lg text-[10px] font-bold ${view === 'print' ? 'bg-blue-600' : 'text-slate-400'}`}>PREVIA</button>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setIsAppMode(!isAppMode)} className="px-3 py-1.5 rounded-lg bg-slate-800 text-slate-300 text-[10px] font-black border border-slate-700 uppercase">Modo App</button>
                                <button onClick={() => window.print()} className="bg-white text-slate-900 px-5 py-1.5 rounded-lg text-[10px] font-black shadow-lg uppercase">Imprimir</button>
                            </div>
                        </nav>
                    )}
                    <main className="flex flex-col items-center justify-center p-6">
                        {view === 'scan' && (
                            <div className="max-w-3xl w-full mt-10 md:mt-16 text-center animate-fade">
                                <div className="w-24 h-24 bg-blue-600 text-white rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-2xl font-black text-4xl">M</div>
                                <h1 className="text-5xl font-black text-slate-900 tracking-tighter mb-4">Mouser Smart Scan</h1>
                                <p className="text-slate-500 text-xl font-medium mb-12">Conversión industrial de albaranes a etiquetas.</p>
                                {errorMsg && <div className="bg-red-50 border border-red-200 text-red-700 p-4 rounded-2xl mb-8 text-sm font-bold animate-pulse">⚠️ {errorMsg}</div>}
                                <div className="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-200 mb-10">
                                    <div className="space-y-6">
                                        <label className="flex flex-col items-center justify-center w-full h-56 border-2 border-slate-300 border-dashed rounded-[2.5rem] cursor-pointer hover:border-blue-500 bg-slate-50/50 transition-all">
                                            <p className="text-sm font-black text-slate-700 uppercase">{fileData.base64 ? "✓ ARCHIVO LISTO" : "Subir Albarán (PDF / Imagen)"}</p>
                                            <input type="file" className="hidden" onChange={handleFile} accept="application/pdf,image/*" />
                                        </label>
                                        <div className="relative flex items-center justify-center"><span className="absolute inset-0 border-t border-slate-100 top-1/2"></span><span className="relative bg-white px-3 text-[10px] font-black text-slate-300 uppercase">O pega el texto</span></div>
                                        <textarea value={rawText} onChange={(e) => setRawText(e.target.value)} placeholder="Contenido del albarán..." className="w-full h-32 p-6 bg-slate-50 border border-slate-200 rounded-[1.5rem] text-sm outline-none resize-none shadow-inner"></textarea>
                                        <button onClick={processAI} disabled={isScanning || (!rawText.trim() && !fileData.base64)} className="w-full py-6 bg-blue-600 text-white rounded-[2rem] font-black shadow-2xl hover:bg-blue-700 disabled:bg-slate-200 flex items-center justify-center gap-4 text-xl">
                                            {isScanning ? <div className="animate-spin h-6 w-6 border-4 border-white border-t-transparent rounded-full"></div> : "IDENTIFICAR MATERIAL"}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                        {view === 'edit' && (
                            <div className="max-w-6xl w-full py-8 space-y-10 animate-fade">
                                <div className="bg-slate-900 text-white p-10 rounded-[3rem] shadow-2xl grid grid-cols-1 md:grid-cols-4 gap-8">
                                    <EditField label="Factura" value={data.invoice} onChange={v => setData({...data, invoice: v})} />
                                    <EditField label="Pedido" value={data.order} onChange={v => setData({...data, order: v})} />
                                    <EditField label="Fecha" value={data.date} type="date" onChange={v => setData({...data, date: v})} />
                                    <EditField label="Ref. Interna" value={data.internalRef} onChange={v => setData({...data, internalRef: v})} />
                                </div>
                                <div className="space-y-4">
                                    {data.items.map(item => (
                                        <div key={item.id} className="bg-white p-8 rounded-[2rem] border shadow-xl grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 items-end relative overflow-hidden group">
                                            <div className="absolute top-0 left-0 w-2 h-full bg-blue-600"></div>
                                            <EditField label="Mouser PN" value={item.mouserPn} onChange={v => updateItem(item.id, 'mouserPn', v)} />
                                            <EditField label="Customer PN" value={item.custPn} onChange={v => updateItem(item.id, 'custPn', v)} />
                                            <EditField label="Cant." value={item.qty} type="number" onChange={v => updateItem(item.id, 'qty', v)} />
                                            <EditField label="Date Code" value={item.dateCode} onChange={v => updateItem(item.id, 'dateCode', v)} />
                                            <EditField label="COO" value={item.coo} onChange={v => updateItem(item.id, 'coo', v)} />
                                            <button onClick={() => setData({...data, items: data.items.filter(i => i.id !== item.id)})} className="bg-red-50 text-red-600 p-3 rounded-xl font-black text-[10px]">BORRAR</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {view === 'print' && (
                            <div className="w-full max-w-5xl py-12 px-4 space-y-12 animate-fade print:p-0">
                                {data.items.map((item, idx) => (
                                    <div key={item.id} className="label-card bg-white p-12 border-[5px] border-slate-900 break-inside-avoid shadow-2xl w-full flex flex-col">
                                        <div className="flex justify-between border-b-[8px] border-slate-900 pb-8 mb-10">
                                            <div><h2 className="text-5xl font-black uppercase tracking-tighter text-slate-900 mb-1 leading-none">Mouser Logistics</h2><p className="text-[14px] font-bold text-slate-500 uppercase tracking-[0.4em]">Celéstica Valencia S.A.</p></div>
                                            <div className="text-right flex flex-col justify-center border-l-4 border-slate-100 pl-10"><span className="text-[11px] font-black text-slate-400 block uppercase">Factura / Invoice</span><span className="text-4xl font-mono font-black">{data.invoice}</span></div>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8 mb-12">
                                            <Barcode label="Mouser Part Number" value={item.mouserPn} blue />
                                            <Barcode label="Customer Part Number" value={item.custPn} blue />
                                            <Barcode label="Date Code (DC)" value={item.dateCode} />
                                            <Barcode label="Quantity (Qty)" value={item.qty} />
                                            <Barcode label="Lot / Batch No" value={item.lotCode || 'N/A'} />
                                            <Barcode label="Purchase Order" value={data.order} />
                                            <Barcode label="Country of Origin" value={item.coo} />
                                            <div className="flex flex-col items-center justify-center bg-slate-50 border-2 border-slate-200 rounded-2xl p-4">
                                                <span className="text-5xl font-black text-slate-900 leading-none">{idx + 1}<span className="text-2xl text-slate-300">/{data.items.length}</span></span>
                                            </div>
                                        </div>
                                        <div className="border-t-2 border-slate-100 pt-10 text-[14px] font-bold text-slate-500 flex justify-between items-end">
                                            <div className="flex-1 pr-10 border-r-2 border-slate-100"><span className="text-[11px] font-black text-slate-300 uppercase block mb-2 tracking-widest">Descripción del Artículo</span><p className="text-xl font-black text-slate-900 uppercase italic leading-tight">{item.desc || 'Electronic Components'}</p></div>
                                            <div className="text-right flex flex-col font-mono text-[11px] pl-10 space-y-1"><span>REF: {data.internalRef}</span><span>GEN: {new Date().toLocaleTimeString()}</span></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
