<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouser Smart Scan Web</title>
    <!-- Cargamos librerías externas -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
        }

        /* Estilos de Impresión */
        @media print {
            body { background: white !important; margin: 0; }
            nav, .no-print, button, .header-app { display: none !important; }
            main { padding: 0 !important; max-width: 100% !important; margin: 0 !important; }
            @page { margin: 0.5cm; size: A4 portrait; }
            .label-card { 
                box-shadow: none !important; 
                border: 4px solid black !important;
                break-inside: avoid;
                page-break-inside: avoid;
                margin-bottom: 1cm;
            }
        }

        /* Animaciones */
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar estético */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIGURACIÓN DE IA ---
        // IMPORTANTE: PEGA TU API KEY AQUÍ PARA QUE FUNCIONE EN TU WEB
        const apiKey = "AIzaSyCWACbPgBeaMuPyrZS0llgjRegva0GbM6Q"; 
        const MODEL_NAME = "gemini-1.5-flash"; 

        // --- MAPA DE PAÍSES (Basado en tu tabla proporcionada) ---
        const COUNTRY_MAP = {

            "AL": "Albania", "AM": "Armenia", "AN": "Dutch Antilles", "AO": "Angola", "AQ": "Antarctica",
            "AR": "Argentina", "AS": "Samoa, American", "AT": "Austria", "AU": "Australia", "AW": "Aruba",
            "AZ": "Azerbaijan", "BA": "Bosnia-Herz.", "BB": "Barbados", "BD": "Bangladesh", "BE": "Belgium",
            "BF": "Burkina-Faso", "BG": "Bulgaria", "BH": "Bahrain", "BI": "Burundi", "BJ": "Benin",
            "BM": "Bermuda", "BN": "Brunei Dar-es-S", "BO": "Bolivia", "BR": "Brazil", "BS": "Bahamas",

            "EE": "Estonia", "EG": "Egypt", "EH": "West Sahara", "ER": "Eritrea", "ES": "Spain",

            "GE": "Georgia", "GF": "French Guayana", "GH": "Ghana", "GI": "Gibraltar", "GL": "Greenland",
            "GM": "Gambia", "GN": "Guinea", "GP": "Guadeloupe", "GQ": "Equatorial Gui.", "GR": "Greece",
            "GS": "S. Sandwich Ins", "GT": "Guatemala", "GU": "Guam", "GW": "Guinea-Bissau", "GY": "Guyana",
            "HK": "Hong Kong", "HM": "Heard/Mcd.Isl", "HN": "Honduras", "HR": "Croatia", "HT": "Haiti",
            "HU": "Hungary", "ID": "Indonesia", "IE": "Ireland", "IL": "Israel", "IM": "Isle of Man",
            "IN": "India", "IO": "Brit.Ind.Oc.Ter", "IQ": "Iraq", "IR": "Iran", "IS": "Iceland",
            "IT": "Italy", "JM": "Jamaica", "JO": "Jordan", "JP": "Japan", "KE": "Kenya", "KG": "Kyrgyzstan",
            "KH": "Cambodia", "KI": "Kiribati", "KM": "Comoros", "KN": "St Kitts&Nevis", "KP": "North Korea",
            "KR": "South Korea", "KW": "Kuwait", "KY": "Cayman Islands", "KZ": "Kazakhstan", "LA": "Laos",
            "LB": "Lebanon", "LC": "St. Lucia", "LI": "Liechtenstein", "LK": "Sri Lanka", "LR": "Liberia",
            "LS": "Lesotho", "LT": "Lithuania", "LU": "Luxembourg", "LV": "Latvia", "LY": "Libya",
            "MA": "Morocco", "MC": "Monaco", "MD": "Moldavia", "MG": "Madagascar", "MH": "Marshall Islnds",
            "MK": "Macedonia", "ML": "Mali", "MM": "Myanmar", "MN": "Mongolia", "MO": "Macau",
            "MP": "N.Mariana Islnd", "MQ": "Martinique", "MR": "Mauretania", "MS": "Montserrat", "MT": "Malta",
            "MU": "Mauritius", "MV": "Maldives", "MW": "Malawi", "MX": "Mexico", "MY": "Malaysia",
            "MZ": "Mozambique", "NA": "Namibia", "NC": "New Caledonia", "NE": "Niger", "NF": "Norfolk Island",
            "NG": "Nigeria", "NI": "Nicaragua", "NL": "Netherlands", "NO": "Norway", "NP": "Nepal",
            "NR": "Nauru", "NU": "Niue Islands", "NZ": "New Zealand", "OM": "Oman", "PA": "Panama",
            "PE": "Peru", "PF": "Frenc.Polynesia", "PG": "Papua Nw Guinea", "PH": "Philippines", "PK": "Pakistan",
            "PL": "Poland", "PM": "St.Pier.Miquel.", "PN": "Pitcairn Islnds", "PR": "Puerto Rico", "PT": "Portugal",
            "PW": "Palau", "PY": "Paraguay", "QA": "Qatar", "RE": "Reunion", "RO": "Romania", "RS": "Serbia",
            "RU": "Russian Fed.", "RW": "Ruanda", "SA": "Saudi Arabia", "SB": "Solomon Islands", "SC": "Seychelles",
            "SD": "Sudan", "SE": "Sweden", "SG": "Singapore", "SH": "St. Helena", "SI": "Slovenia",
            "SJ": "Svalbard", "SK": "Slovakia", "SL": "Sierra Leone", "SM": "San Marino", "SN": "Senegal",
            "SO": "Somalia", "SR": "Suriname", "ST": "S.Tome,Principe", "SV": "El Salvador", "SX": "Sint Maarten",
            "SY": "Syria", "SZ": "Swaziland", "TC": "Turksh Caicosin", "TD": "Chad", "TF": "French S.Territ",
            "TG": "Togo", "TH": "Thailand", "TJ": "Tajikistan", "TK": "Tokelau Islands", "TM": "Turkmenistan",
            "TN": "Tunisia", "TO": "Tonga", "TP": "East Timor", "TR": "Turkey", "TT": "Trinidad,Tobago",
            "TV": "Tuvalu", "TW": "Taiwan", "TZ": "Tanzania", "UA": "Ukraine", "UG": "Uganda", "UM": "Minor Outl.Ins.",
            "US": "USA", "UY": "Uruguay", "UZ": "Uzbekistan", "VA": "Vatican City", "VC": "St. Vincent",
            "VE": "Venezuela", "VG": "Brit.Virgin Is.", "VI": "Amer.Virgin Is.", "VN": "Vietnam", "VU": "Vanuatu",
            "WF": "Wallis,Futuna", "WS": "Western Samoa", "XX": "Multiple COO", "YE": "Yemen", "YT": "Mayotte",
            "YU": "Serbie", "YY": "Not available", "ZA": "South Africa", "ZM": "Zambia", "ZW": "Zimbabwe"
        };

        const getAbbreviatedCountry = (name) => {
            if (!name) return "N/A";
            const upper = name.trim().toUpperCase();
            // Buscar si ya es una sigla
            if (COUNTRY_MAP[upper]) return upper;
            // Buscar por nombre largo
            const entry = Object.entries(COUNTRY_MAP).find(([key, val]) => val.toUpperCase() === upper);
            if (entry) return entry[0];
            // Casos comunes manuales
            if (upper === "USA") return "US";
            if (upper === "SPAIN") return "ES";
            if (upper === "CHINA") return "CN";
            return name; // Devolver original si no hay match
        };

        // --- COMPONENTES ---

        const Barcode = ({ value, label, color = "slate" }) => {
            const svgRef = useRef(null);
            useEffect(() => {
                if (value && svgRef.current) {
                    try {
                        window.JsBarcode(svgRef.current, String(value), {
                            format: "CODE128",
                            lineColor: "#000",
                            width: 1.3,
                            height: 30,
                            displayValue: true,
                            fontSize: 10,
                            font: "monospace",
                            margin: 2
                        });
                    } catch (e) { console.error(e); }
                }
            }, [value]);

            const textColor = color === "blue" ? "text-blue-700 border-blue-100" : "text-slate-600 border-slate-100";
            return (
                <div className={`flex flex-col items-center border rounded bg-white p-1 shadow-sm ${textColor}`}>
                    <span className="text-[7px] font-black uppercase w-full px-1">{label}</span>
                    <svg ref={svgRef} className="max-w-full"></svg>
                </div>
            );
        };

        const InputField = ({ label, value, onChange, type = "text" }) => (
            <div className="flex flex-col gap-1 w-full text-left">
                <label className="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">{label}</label>
                <input 
                    type={type} 
                    value={value || ""} 
                    onChange={(e) => onChange(e.target.value)} 
                    className="border border-slate-200 rounded px-3 py-2 text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none w-full bg-white transition-all shadow-sm"
                />
            </div>
        );

        // --- APLICACIÓN PRINCIPAL ---

        function App() {
            const [view, setView] = useState('scan'); // scan, edit, print
            const [isScanning, setIsScanning] = useState(false);
            const [isAppMode, setIsAppMode] = useState(false);
            const [rawText, setRawText] = useState("");
            const [fileData, setFileData] = useState({ base64: null, mime: "" });
            const [data, setData] = useState({ invoice: "", order: "", internalRef: "", date: new Date().toISOString().split('T')[0], items: [] });
            const [errorMsg, setErrorMsg] = useState(null);

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        setFileData({ base64: reader.result.split(',')[1], mime: file.type });
                        setRawText(`Archivo seleccionado: ${file.name}`);
                        setErrorMsg(null);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const processAI = async () => {
                if (!apiKey || apiKey === "") {
                    setErrorMsg("Falta la API KEY en el código. Edita el archivo y añade tu clave de Google Gemini.");
                    return;
                }
                if (!rawText.trim() && !fileData.base64) return;

                setIsScanning(true);
                setErrorMsg(null);

                const prompt = "Extrae de este albarán: Invoice, Purchase Order (PO), Mouser Part Number, Customer Part Number, Quantity, Date Code, Lot Number y País de Origen (COO). Devuelve UNICAMENTE un JSON válido con esta estructura: { \"invoice\": \"string\", \"order\": \"string\", \"internalRef\": \"string\", \"date\": \"YYYY-MM-DD\", \"items\": [{ \"mouserPn\": \"string\", \"custPn\": \"string\", \"desc\": \"string\", \"qty\": number, \"dateCode\": \"string\", \"lotCode\": \"string\", \"coo\": \"string\" }] }";

                try {
                    const payload = {
                        contents: [{ 
                            parts: [
                                { text: `Analiza este documento y extrae los datos solicitados: ${rawText}` },
                                ...(fileData.base64 ? [{ inlineData: { mimeType: fileData.mime, data: fileData.base64 } }] : [])
                            ] 
                        }],
                        systemInstruction: { parts: [{ text: prompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    };

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error?.message || "Error de conexión con Google AI");
                    }

                    const result = await response.json();
                    let rawResponse = result.candidates[0].content.parts[0].text;
                    const cleanJson = JSON.parse(rawResponse.replace(/```json|```/g, "").trim());
                    
                    cleanJson.items = (cleanJson.items || []).map(item => ({
                        ...item,
                        id: Math.random().toString(36).substr(2, 9),
                        coo: getAbbreviatedCountry(item.coo)
                    }));

                    setData(cleanJson);
                    setView('print');
                } catch (e) {
                    console.error(e);
                    setErrorMsg(`Error: ${e.message}`);
                } finally {
                    setIsScanning(false);
                }
            };

            const updateItem = (id, key, val) => {
                setData(prev => ({
                    ...prev,
                    items: prev.items.map(i => i.id === id ? { ...i, [key]: key === 'coo' ? getAbbreviatedCountry(val) : val } : i)
                }));
            };

            return (
                <div className={`min-h-screen transition-all duration-500 ${isAppMode ? 'bg-white' : 'bg-slate-100'}`}>
                    
                    {/* BARRA DE NAVEGACIÓN */}
                    {view !== 'scan' && (
                        <nav className="header-app bg-slate-900 text-white px-6 py-4 flex justify-between items-center shadow-xl sticky top-0 z-50">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('scan')}>
                                <div className="bg-blue-600 text-white w-8 h-8 rounded flex items-center justify-center font-black">M</div>
                                <span className="text-xs font-black tracking-widest uppercase">Mouser SmartScan</span>
                            </div>
                            <div className="flex gap-2 bg-slate-800 p-1 rounded-xl">
                                <button onClick={() => setView('edit')} className={`px-4 py-1.5 rounded-lg text-[10px] font-bold ${view === 'edit' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>EDITAR</button>
                                <button onClick={() => setView('print')} className={`px-4 py-1.5 rounded-lg text-[10px] font-bold ${view === 'print' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>PREVIA</button>
                            </div>
                            <div className="flex items-center gap-3">
                                <button onClick={() => setIsAppMode(!isAppMode)} className="text-[10px] font-black bg-slate-800 border border-slate-700 px-3 py-1.5 rounded-lg text-slate-300">MODO APP</button>
                                <button onClick={() => window.print()} className="bg-white text-slate-900 px-5 py-1.5 rounded-lg text-[10px] font-black shadow-lg">IMPRIMIR</button>
                            </div>
                        </nav>
                    )}

                    <main className="flex flex-col items-center justify-center p-6">
                        
                        {/* VISTA 1: CARGA */}
                        {view === 'scan' && (
                            <div className="max-w-2xl w-full mt-10 md:mt-20 text-center animate-fade-in">
                                <div className="w-24 h-24 bg-blue-600 text-white rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-2xl font-black text-4xl">M</div>
                                <h1 className="text-5xl font-black text-slate-900 tracking-tighter mb-4">Smart Scan Web</h1>
                                <p className="text-slate-500 text-lg font-medium mb-12">Conversión instantánea de albaranes a etiquetas industriales.</p>

                                {errorMsg && <div className="bg-red-50 border border-red-200 text-red-700 p-4 rounded-2xl mb-8 text-sm font-bold">⚠️ {errorMsg}</div>}

                                <div className="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100 mb-10">
                                    <div className="space-y-6">
                                        <label className="flex flex-col items-center justify-center w-full h-56 border-2 border-slate-200 border-dashed rounded-[2.5rem] cursor-pointer hover:border-blue-500 bg-slate-50/50 transition-all">
                                            <p className="text-sm font-black text-slate-700 uppercase">{fileData.base64 ? "✓ ARCHIVO LISTO" : "Seleccionar Albarán (PDF / Imagen)"}</p>
                                            <input type="file" className="hidden" onChange={handleFile} accept="application/pdf,image/*" />
                                        </label>
                                        <div className="relative flex items-center justify-center">
                                            <span className="absolute inset-0 border-t border-slate-100 top-1/2"></span>
                                            <span className="relative bg-white px-3 text-[10px] font-black text-slate-300 uppercase tracking-widest">O pega el texto</span>
                                        </div>
                                        <textarea value={rawText} onChange={(e) => setRawText(e.target.value)} placeholder="Contenido del documento..." className="w-full h-32 p-6 bg-slate-50 border border-slate-100 rounded-[1.5rem] text-sm outline-none resize-none shadow-inner"></textarea>
                                        <button onClick={processAI} disabled={isScanning || (!rawText.trim() && !fileData.base64)} className="w-full py-5 bg-blue-600 text-white rounded-[2rem] font-black shadow-2xl hover:bg-blue-700 disabled:bg-slate-200 flex items-center justify-center gap-4 text-xl">
                                            {isScanning ? <div className="animate-spin h-6 w-6 border-4 border-white border-t-transparent rounded-full"></div> : "GENERAR ETIQUETAS"}
                                        </button>
                                    </div>
                                </div>
                                <button onClick={() => setIsAppMode(!isAppMode)} className="text-slate-400 text-[10px] font-black uppercase tracking-[0.3em] flex items-center gap-2 mx-auto">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" /></svg>
                                    ACTIVAR MODO APP INMERSIVO
                                </button>
                            </div>
                        )}

                        {/* VISTA 2: EDICIÓN */}
                        {view === 'edit' && (
                            <div className="max-w-6xl w-full py-10 space-y-10 animate-fade-in">
                                <div className="bg-slate-900 text-white p-10 rounded-[3rem] shadow-2xl grid grid-cols-1 md:grid-cols-4 gap-8">
                                    <InputField label="Factura" value={data.invoice} onChange={v => setData({...data, invoice: v})} />
                                    <InputField label="Pedido (PO)" value={data.order} onChange={v => setData({...data, order: v})} />
                                    <InputField label="Fecha Envío" value={data.date} type="date" onChange={v => setData({...data, date: v})} />
                                    <InputField label="Ref. Interna" value={data.internalRef} onChange={v => setData({...data, internalRef: v})} />
                                </div>
                                <div className="space-y-4">
                                    {data.items.map(item => (
                                        <div key={item.id} className="bg-white p-8 rounded-[2rem] border shadow-xl grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 items-end relative overflow-hidden group">
                                            <div className="absolute top-0 left-0 w-2 h-full bg-blue-600"></div>
                                            <InputField label="Mouser PN" value={item.mouserPn} onChange={v => updateItem(item.id, 'mouserPn', v)} />
                                            <InputField label="Customer PN" value={item.custPn} onChange={v => updateItem(item.id, 'custPn', v)} />
                                            <InputField label="Cant." value={item.qty} type="number" onChange={v => updateItem(item.id, 'qty', v)} />
                                            <InputField label="Date Code" value={item.dateCode} onChange={v => updateItem(item.id, 'dateCode', v)} />
                                            <InputField label="COO" value={item.coo} onChange={v => updateItem(item.id, 'coo', v)} />
                                            <button onClick={() => setData({...data, items: data.items.filter(i => i.id !== item.id)})} className="bg-red-50 text-red-600 p-3 rounded-xl font-black text-[10px]">BORRAR</button>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setView('print')} className="w-full py-6 bg-blue-600 text-white rounded-[2rem] font-black shadow-2xl text-xl">GUARDAR CAMBIOS</button>
                            </div>
                        )}

                        {/* VISTA 3: IMPRESIÓN */}
                        {view === 'print' && (
                            <div className="w-full max-w-5xl py-12 px-4 space-y-12 animate-fade-in print:p-0">
                                {data.items.map((item, idx) => (
                                    <div key={item.id} className="label-card bg-white p-12 border-[5px] border-slate-900 shadow-2xl w-full flex flex-col">
                                        <div className="flex justify-between border-b-[6px] border-slate-900 pb-6 mb-10">
                                            <div>
                                                <h2 className="text-5xl font-black uppercase tracking-tighter text-slate-900 leading-none">Mouser Logistics</h2>
                                                <p className="text-[12px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-2">Logística Certificada · Celéstica Valencia</p>
                                            </div>
                                            <div className="text-right border-l-2 border-slate-200 pl-10 flex flex-col justify-center">
                                                <span className="text-[10px] font-black text-slate-400 block uppercase">Albarán / Invoice</span>
                                                <span className="text-4xl font-mono font-black">{data.invoice}</span>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mb-10">
                                            <Barcode label="Mouser Part Number" value={item.mouserPn} color="blue" />
                                            <Barcode label="Customer Part Number" value={item.custPn} color="blue" />
                                            <Barcode label="Date Code (DC)" value={item.dateCode} color="blue" />
                                            <Barcode label="Quantity (Units)" value={item.qty} color="blue" />
                                            <Barcode label="Lot / Batch No" value={item.lotCode || 'N/A'} />
                                            <Barcode label="Purchase Order" value={data.order} />
                                            <Barcode label="Country of Origin" value={item.coo} />
                                            <div className="flex flex-col items-center justify-center bg-slate-50 border-2 border-slate-100 rounded-xl p-3">
                                                <span className="text-5xl font-black text-slate-900">{idx + 1}<span className="text-2xl text-slate-300">/{data.items.length}</span></span>
                                            </div>
                                        </div>
                                        <div className="border-t-2 border-slate-100 pt-8 flex justify-between items-end">
                                            <div className="flex-1 pr-10 border-r-2 border-slate-100">
                                                <span className="text-[10px] font-black text-slate-300 uppercase block mb-1">Descripción de Material</span>
                                                <p className="text-xl font-black text-slate-900 uppercase italic leading-tight">{item.desc || 'Electronic Components'}</p>
                                            </div>
                                            <div className="text-right flex flex-col font-mono text-[10px] pl-10 space-y-1 text-slate-400">
                                                <span>REF: {data.internalRef}</span>
                                                <span>SHIP: {data.date}</span>
                                                <span className="text-slate-900 font-black">GEN: {new Date().toLocaleTimeString()}</span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
