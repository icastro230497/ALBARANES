    <title>Mouser Smart Scan Web</title>
    <!-- Cargamos React y librerías externas vía CDN con soporte para CORS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        @media print {
            body { background: white !important; margin: 0; }
            nav, header, button, .print-hidden, .no-print { display: none !important; }
            main { padding: 0 !important; max-width: 100% !important; margin: 0 !important; }
            @page { margin: 0.5cm; size: A4 portrait; }
            .break-inside-avoid { break-inside: avoid; }
        }

        .animate-in { animation: anim-in 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes anim-in {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 3px solid #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIGURACIÓN DE IA ---
        // ⚠️ IMPORTANTE: PEGA TU API KEY AQUÍ PARA QUE FUNCIONE EN GITHUB ⚠️
        // Consíguela en: https://aistudio.google.com/app/apikey
        const apiKey = "AIzaSyCWACbPgBeaMuPyrZS0llgjRegva0GbM6Q"; 
        const MODEL_NAME = "gemini-1.5-flash"; 

        // --- MAPA DE PAÍSES COMPLETO (Siglas de 2 letras) ---

            "GM": "Gambia", "GN": "Guinea", "GP": "Guadeloupe", "GQ": "Equatorial Gui.", "GR": "Greece",
            "GS": "S. Sandwich Ins", "GT": "Guatemala", "GU": "Guam", "GW": "Guinea-Bissau", "GY": "Guyana",
            "HK": "Hong Kong", "HM": "Heard/Mcd.Isl", "HN": "Honduras", "HR": "Croatia", "HT": "Haiti",
            "HU": "Hungary", "ID": "Indonesia", "IE": "Ireland", "IL": "Israel", "IM": "Isle of Man",
            "IN": "India", "IO": "Brit.Ind.Oc.Ter", "IQ": "Iraq", "IR": "Iran", "IS": "Iceland",
            "IT": "Italy", "JM": "Jamaica", "JO": "Jordan", "JP": "Japan", "KE": "Kenya", "KG": "Kyrgyzstan",
            "KH": "Cambodia", "KI": "Kiribati", "KM": "Comoros", "KN": "St Kitts&Nevis", "KP": "North Korea",
            "KR": "South Korea", "KW": "Kuwait", "KY": "Cayman Islands", "KZ": "Kazakhstan", "LA": "Laos",
            "LB": "Lebanon", "LC": "St. Lucia", "LI": "Liechtenstein", "LK": "Sri Lanka", "LR": "Liberia",
            "LS": "Lesotho", "LT": "Lithuania", "LU": "Luxembourg", "LV": "Latvia", "LY": "Libya",
            "MA": "Morocco", "MC": "Monaco", "MD": "Moldavia", "MG": "Madagascar", "MH": "Marshall Islnds",
            "MK": "Macedonia", "ML": "Mali", "MM": "Myanmar", "MN": "Mongolia", "MO": "Macau",
            "MP": "N.Mariana Islnd", "MQ": "Martinique", "MR": "Mauretania", "MS": "Montserrat", "MT": "Malta",
            "MU": "Mauritius", "MV": "Maldives", "MW": "Malawi", "MX": "Mexico", "MY": "Malaysia",
            "MZ": "Mozambique", "NA": "Namibia", "NC": "New Caledonia", "NE": "Niger", "NF": "Norfolk Island",
            "NG": "Nigeria", "NI": "Nicaragua", "NL": "Netherlands", "NO": "Norway", "NP": "Nepal",
            "NR": "Nauru", "NU": "Niue Islands", "NZ": "New Zealand", "OM": "Oman", "PA": "Panama",
            "PE": "Peru", "PF": "Frenc.Polynesia", "PG": "Papua Nw Guinea", "PH": "Philippines", "PK": "Pakistan",
            "PL": "Poland", "PM": "St.Pier.Miquel.", "PN": "Pitcairn Islnds", "PR": "Puerto Rico", "PT": "Portugal",
            "PW": "Palau", "PY": "Paraguay", "QA": "Qatar", "RE": "Reunion", "RO": "Romania", "RS": "Serbia",
            "RU": "Russian Fed.", "RW": "Ruanda", "SA": "Saudi Arabia", "SB": "Solomon Islands", "SC": "Seychelles",
            "SD": "Sudan", "SE": "Sweden", "SG": "Singapore", "SH": "St. Helena", "SI": "Slovenia",
            "SJ": "Svalbard", "SK": "Slovakia", "SL": "Sierra Leone", "SM": "San Marino", "SN": "Senegal",
            "SO": "Somalia", "SR": "Suriname", "ST": "S.Tome,Principe", "SV": "El Salvador", "SX": "Sint Maarten",
            "SY": "Syria", "SZ": "Swaziland", "TC": "Turksh Caicosin", "TD": "Chad", "TF": "French S.Territ",
            "TG": "Togo", "TH": "Thailand", "TJ": "Tajikistan", "TK": "Tokelau Islands", "TM": "Turkmenistan",
            "TN": "Tunisia", "TO": "Tonga", "TP": "East Timor", "TR": "Turkey", "TT": "Trinidad,Tobago",
            "TV": "Tuvalu", "TW": "Taiwan", "TZ": "Tanzania", "UA": "Ukraine", "UG": "Uganda", "UM": "Minor Outl.Ins.",
            "US": "USA", "UY": "Uruguay", "UZ": "Uzbekistan", "VA": "Vatican City", "VC": "St. Vincent",
            "VE": "Venezuela", "VG": "Brit.Virgin Is.", "VI": "Amer.Virgin Is.", "VN": "Vietnam", "VU": "Vanuatu",
            "WF": "Wallis,Futuna", "WS": "Western Samoa", "XX": "Multiple COO", "YE": "Yemen", "YT": "Mayotte",
            "YU": "Serbie", "YY": "Not available", "ZA": "South Africa", "ZM": "Zambia", "ZW": "Zimbabwe"
        };

        const getCountryInitial = (coo) => {
            if (!coo) return "";
            const cleanInput = coo.trim().toUpperCase();
            if (COUNTRY_MAP[cleanInput]) return cleanInput;
            const entry = Object.entries(COUNTRY_MAP).find(([key, val]) => val.toUpperCase() === cleanInput);
            return entry ? entry[0] : (cleanInput === "USA" ? "US" : (cleanInput === "ESPANA" || cleanInput === "SPAIN" ? "ES" : coo));
        };

        // --- COMPONENTES ---

        const BarcodeItem = ({ label, value, color = "slate", height = 35 }) => {
            const svgRef = useRef(null);
            useEffect(() => {
                if (value && window.JsBarcode && svgRef.current) {
                    try {
                        window.JsBarcode(svgRef.current, String(value), {
                            format: "CODE128",
                            lineColor: "#000",
                            width: 1.3,
                            height: height,
                            displayValue: true,
                            fontSize: 10,
                            font: "monospace",
                            margin: 4,
                            background: "#ffffff"
                        });
                    } catch (e) { console.error("Error al generar código de barras", e); }
                }
            }, [value, height]);

            const colorClass = color === "blue" ? "text-blue-700 border-blue-100" : "text-slate-600 border-slate-100";
            return (
                <div className={`flex flex-col items-center border rounded-lg bg-white p-1.5 shadow-sm ${colorClass}`}>
                    <div className="w-full flex justify-between px-1 mb-0.5">
                        <span className="text-[8px] font-black uppercase tracking-wider">{label}</span>
                    </div>
                    <svg ref={svgRef} className="max-w-full h-auto"></svg>
                </div>
            );
        };

        const EditableField = ({ label, value, onChange, type = "text" }) => (
            <div className="flex flex-col gap-1 w-full text-left">
                <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{label}</label>
                <input
                    type={type}
                    value={value || ""}
                    onChange={(e) => onChange(e.target.value)}
                    className="border border-slate-200 rounded px-3 py-1.5 text-sm font-bold text-slate-800 focus:ring-2 focus:ring-blue-500 outline-none transition-all w-full bg-white"
                />
            </div>
        );

        // --- APP ---

        function App() {
            const [view, setView] = useState('scan');
            const [isScanning, setIsScanning] = useState(false);
            const [isAppMode, setIsAppMode] = useState(false);
            const [rawText, setRawText] = useState("");
            const [fileBase64, setFileBase64] = useState(null);
            const [fileMimeType, setFileMimeType] = useState("");
            const [data, setData] = useState({ invoice: "", order: "", internalRef: "", date: new Date().toISOString().split('T')[0], items: [] });
            const [errorMsg, setErrorMsg] = useState(null);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        setFileBase64(reader.result.split(',')[1]);
                        setFileMimeType(file.type);
                        setRawText(`Archivo cargado: ${file.name}`);
                        setErrorMsg(null);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const processDocument = async () => {
                if (!apiKey || apiKey === "" || apiKey === "TU_CLAVE_AQUI") {
                    setErrorMsg("FALTA LA CLAVE API: Por favor, edita el archivo y pega tu API Key en la línea 66.");
                    return;
                }
                setIsScanning(true);
                setErrorMsg(null);

                const systemPrompt = "Extrae datos de albarán industrial de Mouser. Devuelve ÚNICAMENTE un JSON válido sin markdown: { \"invoice\": \"str\", \"order\": \"str\", \"internalRef\": \"str\", \"date\": \"YYYY-MM-DD\", \"items\": [{ \"mouserPn\": \"str\", \"custPn\": \"str\", \"desc\": \"str\", \"qty\": num, \"dateCode\": \"str\", \"lotCode\": \"str\", \"coo\": \"str\" }] }";

                try {
                    const payload = {
                        contents: [{ parts: [{ text: `Extrae la información de: ${rawText}` }, ...(fileBase64 ? [{ inlineData: { mimeType: fileMimeType, data: fileBase64 } }] : [])] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json", temperature: 0.1 }
                    };

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.error?.message || "Error en la conexión con la IA de Google.");
                    }

                    const result = await response.json();
                    let textResponse = result.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                    const extracted = JSON.parse(textResponse);
                    
                    extracted.items = (extracted.items || []).map(item => ({ 
                        ...item, 
                        id: Math.random().toString(36), 
                        coo: getCountryInitial(item.coo) 
                    }));

                    setData(extracted);
                    setView('print');
                } catch (error) {
                    console.error("Error completo:", error);
                    setErrorMsg(`ERROR: ${error.message}`);
                } finally {
                    setIsScanning(false);
                }
            };

            const updateItem = (id, key, val) => {
                setData(prev => ({ ...prev, items: prev.items.map(i => i.id === id ? { ...i, [key]: key === 'coo' ? getCountryInitial(val) : val } : i) }));
            };

            return (
                <div className={`min-h-screen transition-all ${isAppMode ? 'bg-white' : 'bg-slate-100'}`}>
                    {view !== 'scan' && (
                        <nav className="bg-slate-900 text-white px-6 py-4 sticky top-0 z-50 shadow-xl print:hidden flex justify-between items-center border-b border-slate-700">
                            <div className="flex items-center gap-4 cursor-pointer" onClick={() => setView('scan')}>
                                <div className="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center font-black shadow-lg">M</div>
                                <div className="hidden md:block text-left"><span className="text-sm font-black uppercase tracking-widest block">Logistics Terminal</span></div>
                            </div>
                            <div className="flex gap-2 bg-slate-800 p-1 rounded-2xl">
                                <button onClick={() => setView('review')} className={`px-6 py-2 rounded-xl text-[10px] font-black ${view === 'review' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>EDITAR DATOS</button>
                                <button onClick={() => setView('print')} className={`px-6 py-2 rounded-xl text-[10px] font-black ${view === 'print' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>VER ETIQUETAS</button>
                            </div>
                            <div className="flex items-center gap-3">
                                <button onClick={() => setIsAppMode(!isAppMode)} className={`p-2.5 rounded-xl border border-slate-700 bg-slate-800 text-slate-300`}>MODO APP</button>
                                <button onClick={() => window.print()} className="bg-white text-slate-900 px-6 py-2 rounded-xl text-[10px] font-black shadow-xl uppercase">Imprimir</button>
                            </div>
                        </nav>
                    )}

                    <main className="flex flex-col items-center justify-center min-h-screen">
                        {view === 'scan' && (
                            <div className="max-w-3xl w-full px-6 py-12 animate-in text-center">
                                <div className="mb-12 relative inline-block">
                                    <div className="w-28 h-28 bg-blue-600 text-white rounded-[2.5rem] flex items-center justify-center mx-auto mb-8 shadow-2xl">M</div>
                                </div>
                                <h1 className="text-6xl font-black text-slate-900 tracking-tighter mb-4">Smart Scan App</h1>
                                <p className="text-slate-500 text-xl font-medium mb-12">Procesamiento automático de albaranes con siglas de países.</p>

                                {errorMsg && (
                                    <div className="bg-red-50 border border-red-200 text-red-700 px-6 py-4 rounded-3xl mb-8 text-sm font-bold animate-pulse">
                                        ⚠️ {errorMsg}
                                    </div>
                                )}

                                <div className="bg-white p-12 rounded-[4rem] shadow-2xl border border-slate-100 mb-12">
                                    <div className="space-y-8">
                                        <label className="flex flex-col items-center justify-center w-full h-64 border-2 border-slate-200 border-dashed rounded-[3rem] cursor-pointer hover:border-blue-500 bg-slate-50/30 transition-all">
                                            <div className="p-8 text-center"><p className="text-lg font-black text-slate-800 uppercase tracking-tight">{fileBase64 ? "✓ ARCHIVO LISTO" : "Subir Albarán (PDF / Imagen)"}</p></div>
                                            <input type="file" className="hidden" onChange={handleFileUpload} accept="application/pdf,image/*" />
                                        </label>
                                        <textarea value={rawText} onChange={(e) => setRawText(e.target.value)} placeholder="Contenido del albarán..." className="w-full h-40 p-8 bg-slate-50 border border-slate-100 rounded-[2.5rem] text-sm outline-none resize-none shadow-inner font-medium"></textarea>
                                        <button onClick={processDocument} disabled={isScanning || (!rawText.trim() && !fileBase64)} className="w-full py-8 bg-blue-600 text-white rounded-[2.5rem] font-black shadow-2xl hover:bg-blue-700 disabled:bg-slate-200 disabled:text-slate-400 flex items-center justify-center gap-6 text-2xl">
                                            {isScanning ? <div className="animate-spin h-8 w-8 border-4 border-white border-t-transparent rounded-full"></div> : "GENERAR ETIQUETAS"}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'review' && (
                            <div className="max-w-6xl w-full py-12 px-6 animate-in space-y-12">
                                <div className="bg-slate-900 text-white p-12 rounded-[4rem] shadow-2xl grid grid-cols-1 md:grid-cols-4 gap-10">
                                    <EditableField label="Factura" value={data.invoice} onChange={v => setData({...data, invoice: v})} />
                                    <EditableField label="Pedido" value={data.order} onChange={v => setData({...data, order: v})} />
                                    <EditableField label="Fecha" value={data.date} type="date" onChange={v => setData({...data, date: v})} />
                                    <EditableField label="Ref. Interna" value={data.internalRef} onChange={v => setData({...data, internalRef: v})} />
                                </div>
                                <div className="space-y-6">
                                    {data.items.map(item => (
                                        <div key={item.id} className="bg-white p-10 rounded-[3rem] border shadow-xl grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8 items-end relative overflow-hidden group">
                                            <div className="absolute top-0 left-0 w-2 h-full bg-blue-600"></div>
                                            <EditableField label="Mouser PN" value={item.mouserPn} onChange={v => updateItem(item.id, 'mouserPn', v)} />
                                            <EditableField label="Customer PN" value={item.custPn} onChange={v => updateItem(item.id, 'custPn', v)} />
                                            <EditableField label="Cantidad" value={item.qty} type="number" onChange={v => updateItem(item.id, 'qty', parseInt(v) || 0)} />
                                            <EditableField label="Date Code" value={item.dateCode} onChange={v => updateItem(item.id, 'dateCode', v)} />
                                            <EditableField label="COO (País)" value={item.coo} onChange={v => updateItem(item.id, 'coo', v)} />
                                            <button onClick={() => setData(prev => ({ ...prev, items: prev.items.filter(i => i.id !== item.id) }))} className="bg-red-50 text-red-600 p-4 rounded-[1.5rem] text-[11px] font-black uppercase hover:bg-red-100">Borrar</button>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setView('print')} className="w-full py-8 bg-blue-600 text-white rounded-[3rem] font-black shadow-2xl text-2xl hover:bg-blue-700 uppercase tracking-widest">ACTUALIZAR ETIQUETAS</button>
                            </div>
                        )}

                        {view === 'print' && (
                            <div className="w-full max-w-5xl py
